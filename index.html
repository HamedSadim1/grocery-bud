<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/grocery.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groceries App</title>
    <script>
      // Apply theme before React mounts to avoid dark/light flash.
      // SSOT: key must stay in sync with STORAGE_KEY in src/hooks/useDarkMode.ts.
      (function () {
        try {
          var pref = localStorage.getItem('grocery-bud:theme');
          var sysDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme =
            pref === 'light' || pref === 'dark'
              ? pref
              : sysDark
                ? 'dark'
                : 'light';
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <style>
      /* Prevent flash: apply background + text color before external CSS loads.
         Uses the same token values as :root / [data-theme="dark"] in index.css.
         Placed after the script so data-theme is already set when CSS applies. */
      html {
        background-color: #f5f6fb;
        color: #1e1f29;
      }
      html[data-theme='dark'] {
        background-color: #0f1019;
        color: #e6e8f0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
